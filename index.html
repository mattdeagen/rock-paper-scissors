<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css" integrity="sha512-KfkfwYDsLkIlwQp6LFnl8zNdLGxu9YAA1QvwINks4PhcElQSvqcyVLLD9aMhXd13uQjoXtEKNosOWaZqXgel0g==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="styles.css">
    <title>Document</title>
</head>
<body>
    <h1 id="title">Rock Paper Scissors</h1>
    <h2>First to 5 points wins!</h2>

    <div class="scoreboard-container">
        <div class="score">
            <h3>Player Score:</h3>
            <p id="player-score">0</p>
        </div>
        <div class="score">
            <h3>Computer Score:</h3>
            <p id="computer-score">0</p>
        </div>
    </div>
    
    <h2 id="instructions">Choose your weapon:</h2>

    <div class="choice-container">
        <button class="choice" id="rock-btn" value="rock">
            <i class="fa-solid fa-hand-back-fist"></i>
        </button>
        <button class="choice" id="paper-btn" value="paper">
            <i class="fa-solid fa-scroll"></i>
        </button>
        <button class="choice" id="scissors-btn" value="scissors">
            <i class="fa-solid fa-scissors"></i>
        </button>
    </div>
    <p id="results"></p>

    <script src="script.js"></script>
</body>
</html>
